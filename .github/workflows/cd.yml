name: CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/overlays/**'

permissions:
  contents: write
  packages: write
  security-events: write

concurrency:
  group: cd-deploy
  cancel-in-progress: false

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/civicpulse/geo-api
          tags: |
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          trivyignores: '.trivyignore'

      - name: Upload Trivy SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          sarif_file: 'trivy-results.sarif'

  update-dev-manifest:
    runs-on: ubuntu-latest
    needs: build-scan-push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.8.1/kustomize_v5.8.1_linux_amd64.tar.gz" | tar xz
          sudo mv kustomize /usr/local/bin/kustomize

      - name: Update dev image tag
        run: |
          cd k8s/overlays/dev
          kustomize edit set image ghcr.io/civicpulse/geo-api=ghcr.io/civicpulse/geo-api:${{ needs.build-scan-push.outputs.sha_tag }}

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/kustomization.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(deploy): update dev image to ${{ needs.build-scan-push.outputs.sha_tag }} [skip ci]"
          git push
