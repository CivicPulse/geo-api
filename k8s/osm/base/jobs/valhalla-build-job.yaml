apiVersion: batch/v1
kind: Job
metadata:
  name: valhalla-build-job
  namespace: civpulse-gis
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valhalla-build-job
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/hostname: thor
      containers:
        - name: valhalla-build
          image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              # Strong idempotency: the .tar is the final build artifact.
              # Checking for the valhalla_tiles/ directory alone is unreliable
              # because failed pods leave empty directories behind.
              if [ -f /custom_files/valhalla_tiles.tar ] && [ -s /custom_files/valhalla_tiles.tar ]; then
                echo "Valhalla tiles.tar already built ($(stat -c%s /custom_files/valhalla_tiles.tar) bytes), skipping"
                exit 0
              fi
              if [ ! -f /custom_files/georgia-latest.osm.pbf ]; then
                echo "Copying PBF into valhalla custom_files/ (entrypoint expects it there)..."
                cp /data/pbf/georgia-latest.osm.pbf /custom_files/georgia-latest.osm.pbf
              fi
              # Clean any partial state from failed prior runs
              rm -rf /custom_files/valhalla_tiles /custom_files/valhalla.json /custom_files/admins.sqlite /custom_files/timezones.sqlite 2>/dev/null || true
              echo "Starting Valhalla build..."
              exec /valhalla/scripts/run.sh build_tiles
          env:
            - name: serve_tiles
              value: "False"
            - name: force_rebuild
              value: "False"
            - name: build_admins
              value: "False"
            - name: build_elevation
              value: "False"
            - name: use_tiles_ignore_pbf
              value: "False"
            - name: tile_urls
              value: ""
          resources:
            requests:
              cpu: "2"
              memory: 10Gi
            limits:
              cpu: "4"
              memory: 16Gi
          volumeMounts:
            - name: valhalla-tiles
              mountPath: /custom_files
            - name: osm-pbf
              mountPath: /data/pbf
              readOnly: true
      volumes:
        - name: valhalla-tiles
          persistentVolumeClaim:
            claimName: valhalla-tiles-pvc
        - name: osm-pbf
          persistentVolumeClaim:
            claimName: osm-pbf-pvc
            readOnly: true
