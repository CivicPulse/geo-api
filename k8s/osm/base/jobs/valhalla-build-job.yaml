apiVersion: batch/v1
kind: Job
metadata:
  name: valhalla-build-job
  namespace: civpulse-gis
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valhalla-build-job
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/hostname: thor
      containers:
        - name: valhalla-build
          image: ghcr.io/valhalla/valhalla:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              if [ -d /custom_files/valhalla_tiles ] && [ "$(ls -A /custom_files/valhalla_tiles 2>/dev/null)" ]; then
                echo "Valhalla tiles already built, skipping"
                exit 0
              fi
              if [ ! -f /custom_files/georgia-latest.osm.pbf ]; then
                echo "Copying PBF into valhalla custom_files/ (entrypoint expects it there)..."
                cp /data/pbf/georgia-latest.osm.pbf /custom_files/georgia-latest.osm.pbf
              fi
              echo "Starting Valhalla build..."
              exec /valhalla/scripts/run.sh
          env:
            - name: serve_tiles
              value: "False"
            - name: force_rebuild
              value: "True"
            - name: build_admins
              value: "False"
            - name: build_elevation
              value: "False"
            - name: use_tiles_ignore_pbf
              value: "False"
            - name: tile_urls
              value: ""
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "4"
              memory: 12Gi
          volumeMounts:
            - name: valhalla-tiles
              mountPath: /custom_files
            - name: osm-pbf
              mountPath: /data/pbf
              readOnly: true
      volumes:
        - name: valhalla-tiles
          persistentVolumeClaim:
            claimName: valhalla-tiles-pvc
        - name: osm-pbf
          persistentVolumeClaim:
            claimName: osm-pbf-pvc
            readOnly: true
