apiVersion: batch/v1
kind: Job
metadata:
  name: tile-import-job
  namespace: civpulse-gis
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 10800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tile-import-job
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/hostname: thor
      containers:
        - name: tile-import
          image: overv/openstreetmap-tile-server:2.3.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              if [ -f /data/database/postgres/PG_VERSION ]; then
                echo "tile-server data already imported (postgres dir present), skipping"
                exit 0
              fi
              echo "Running tile-server import..."
              exec /run.sh import
          env:
            - name: NAME_LUA
              value: openstreetmap-carto.lua
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
            limits:
              cpu: "2"
              memory: 8Gi
          volumeMounts:
            - name: osm-tile-data
              mountPath: /data/database
            - name: osm-pbf
              mountPath: /data/region.osm.pbf
              subPath: georgia-latest.osm.pbf
              readOnly: true
      volumes:
        - name: osm-tile-data
          persistentVolumeClaim:
            claimName: osm-tile-data-pvc
        - name: osm-pbf
          persistentVolumeClaim:
            claimName: osm-pbf-pvc
            readOnly: true
