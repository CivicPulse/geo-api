apiVersion: apps/v1
kind: Deployment
metadata:
  name: nominatim
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: nominatim
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nominatim
    spec:
      containers:
        - name: nominatim
          image: mediagis/nominatim:5.2
          ports:
            - containerPort: 8080
          env:
            - name: PBF_PATH
              value: /nominatim/pbf/georgia-latest.osm.pbf
            - name: REPLICATION_URL
              value: ""
          volumeMounts:
            - name: nominatim-data
              mountPath: /var/lib/postgresql/14/main
            - name: osm-pbf
              mountPath: /nominatim/pbf
              readOnly: true
          resources:
            requests:
              memory: "4Gi"
              cpu: "500m"
            limits:
              memory: "8Gi"
              cpu: "2000m"
      volumes:
        - name: nominatim-data
          persistentVolumeClaim:
            claimName: nominatim-data-pvc
        - name: osm-pbf
          persistentVolumeClaim:
            claimName: osm-pbf-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: nominatim
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nominatim
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
