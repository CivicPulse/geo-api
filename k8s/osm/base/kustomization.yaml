apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - nominatim.yaml
  - tile-server.yaml
  - valhalla.yaml
  - osm-pvcs.yaml
  - jobs/pbf-download-job.yaml
  - jobs/tile-import-job.yaml
  - jobs/valhalla-build-job.yaml

# Follow Phase 28 pattern: commonLabels scopes the whole stack;
# each Deployment keeps its explicit app.kubernetes.io/name to avoid
# selector collision. Do NOT add app.kubernetes.io/name here.
commonLabels:
  app.kubernetes.io/part-of: civpulse-osm
