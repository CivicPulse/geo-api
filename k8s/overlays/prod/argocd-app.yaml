apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: geo-api-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CivicPulse/geo-api.git
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: civpulse-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
