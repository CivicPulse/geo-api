apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - pvc.yaml
  - tiger-data-pvc.yaml
  - jobs/tiger-setup-job.yaml

# part-of scopes the app; the geo-api Deployment sets its own
# app.kubernetes.io/name=geo-api explicitly. Do NOT include
# app.kubernetes.io/name in commonLabels — it would be applied to
# selectors and cause selector issues.
commonLabels:
  app.kubernetes.io/part-of: civpulse-geo
