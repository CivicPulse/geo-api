apiVersion: v1
kind: ConfigMap
metadata:
  name: geo-api-config
data:
  ENVIRONMENT: "development"
  LOG_LEVEL: "INFO"
  OLLAMA_URL: "http://localhost:11434"
  CASCADE_LLM_ENABLED: "false"
  CASCADE_ENABLED: "true"
  MAX_BATCH_SIZE: "100"
  BATCH_CONCURRENCY_LIMIT: "10"
  DB_POOL_SIZE: "5"
  DB_MAX_OVERFLOW: "5"
  DB_POOL_RECYCLE: "3600"
  OTEL_EXPORTER_ENDPOINT: "http://tempo.civpulse-infra.svc.cluster.local:4317"
  OTEL_ENABLED: "true"
  LOG_FORMAT: "auto"
  MIN_READY_GEOCODING_PROVIDERS: "1"
  MIN_READY_VALIDATION_PROVIDERS: "1"
  # OSM stack FQDNs (cross-namespace DNS to civpulse-gis, Phase 33 WIRE-01)
  OSM_NOMINATIM_URL: "http://nominatim.civpulse-gis.svc.cluster.local:8080"
  OSM_TILE_URL: "http://tile-server.civpulse-gis.svc.cluster.local:8080"
  OSM_VALHALLA_URL: "http://valhalla.civpulse-gis.svc.cluster.local:8002"
