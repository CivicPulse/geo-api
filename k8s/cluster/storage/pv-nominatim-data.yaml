# Static Local PV. Backed by ZFS dataset nominatim on thor. reclaimPolicy: Retain (STORE-02).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nominatim-data-pv
  labels:
    storage.civpulse.io/dataset: nominatim
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: zfs-local
  volumeMode: Filesystem
  local:
    path: /hatch1/geo/nominatim
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - thor
