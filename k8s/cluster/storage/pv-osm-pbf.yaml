# Static Local PV. Backed by ZFS dataset pbf on thor. reclaimPolicy: Retain (STORE-02).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: osm-pbf-pv
  labels:
    storage.civpulse.io/dataset: osm-pbf
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: zfs-local
  volumeMode: Filesystem
  local:
    path: /hatch1/data/geo/pbf
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - thor
