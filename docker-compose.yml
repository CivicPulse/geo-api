services:
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: civpulse_geo
      POSTGRES_USER: civpulse
      POSTGRES_PASSWORD: civpulse
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/20_tiger_setup.sh:/docker-entrypoint-initdb.d/20_tiger_setup.sh
    ports:
      - "5462:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civpulse -d civpulse_geo"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    environment:
      - OLLAMA_MODELS=qwen2.5:3b
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/entrypoint.sh:ro
    mem_limit: 4g
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    profiles:
      - llm

  api:
    build: .
    command: ["bash", "scripts/docker-entrypoint.sh"]
    environment:
      DATABASE_URL: postgresql+asyncpg://civpulse:civpulse@db:5432/civpulse_geo
      DATABASE_URL_SYNC: postgresql+psycopg2://civpulse:civpulse@db:5432/civpulse_geo
      LOG_LEVEL: DEBUG
      ENVIRONMENT: development
      DEBUG: "0"
      CASCADE_LLM_ENABLED: "${CASCADE_LLM_ENABLED:-false}"
      OLLAMA_URL: "http://ollama:11434"
    ports:
      - "8042:8000"
      - "5680:5680"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./tiger-data:/gisdata/www2.census.gov/geo/tiger/TIGER2024:ro


  # ARCHITECTURAL NOTE (Phase 24 refactor):
  # We originally planned a shared `osm-postgres` service to host the nominatim database
  # (D-02 in 24-CONTEXT.md). During the Phase 24 checkpoint, manual verification revealed
  # that BOTH mediagis/nominatim:5.2 AND overv/openstreetmap-tile-server:2.3.0 bundle and
  # manage their OWN internal PostgreSQL instances. They do not support being pointed at
  # an external PG via a single env var — they would require custom image builds.
  #
  # Decision: drop `osm-postgres` entirely. Each OSM sidecar owns its own PG:
  #   - nominatim → internal PG (persisted in nominatim_data volume)
  #   - tile-server → internal PG (persisted in osm_tile_data volume)
  #   - valhalla → no PG (file-based routing tiles)
  # Isolation from civpulse_geo is achieved via separate volumes per service.
  # The `nominatim` DB is automatically provisioned by the image on first `up`.

  nominatim:
    image: mediagis/nominatim:5.2
    environment:
      # PBF_PATH triggers auto-import on first `up` (~30 min for Georgia extract).
      # Our `osm-import-nominatim` CLI wraps `docker compose up -d nominatim` + health poll.
      PBF_PATH: /nominatim/pbf/georgia-latest.osm.pbf
      REPLICATION_URL: ""
    volumes:
      - nominatim_data:/nominatim/data
      # NOTE: NOT :ro — mediagis/nominatim:5.2 chowns /nominatim/* on startup
      # and fails read-only bind mounts with "Read-only file system" error.
      - ./data/osm:/nominatim/pbf
    ports:
      - "8093:8080"
    restart: "no"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 600s
    profiles:
      - osm

  tile-server:
    image: overv/openstreetmap-tile-server:2.3.0
    # NOTE: This container uses its own internal PostgreSQL (db: gis, user: renderer).
    # It does NOT connect to osm-postgres. Isolation from civpulse_geo is via separate volume.
    # WORKFLOW: Run `osm-import-tiles` FIRST (which invokes `docker compose run --rm tile-server import`)
    # to initialize the internal PG + renderer role + import PBF. Only THEN will `docker compose up tile-server`
    # start cleanly. Before first import, this service exits with: `ERROR: role "renderer" does not exist`.
    volumes:
      - osm_tile_data:/data/database/
      - osm_tile_cache:/data/tiles/
      - ./data/osm:/data/osm:ro
    ports:
      - "8094:8080"
    command: run
    restart: "no"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/tile/0/0/0.png || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    profiles:
      - osm

  valhalla:
    image: ghcr.io/valhalla/valhalla:latest
    # NOTE: The official valhalla image is RUN-BASED — it exits on `up` unless tiles exist.
    # WORKFLOW: Run `osm-build-valhalla` FIRST (which invokes `docker compose run --rm valhalla`
    # with force_rebuild=True) to build routing tiles. Only THEN will `docker compose up valhalla`
    # stay running and serve routes. Before first build, this service exits with code 0.
    environment:
      serve_tiles: "True"
      use_tiles_ignore_pbf: "True"
      build_admins: "False"
      build_elevation: "False"
      force_rebuild: "False"
    volumes:
      - valhalla_tiles:/custom_files
      - ./data/osm:/custom_files/pbf:ro
    ports:
      - "8002:8002"
    restart: "no"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    profiles:
      - osm

volumes:
  postgres_data:
  ollama_data:
  nominatim_data:
  osm_tile_data:
  osm_tile_cache:
  valhalla_tiles:
