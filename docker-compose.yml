services:
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: civpulse_geo
      POSTGRES_USER: civpulse
      POSTGRES_PASSWORD: civpulse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civpulse -d civpulse_geo"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://civpulse:civpulse@db:5432/civpulse_geo
      DATABASE_URL_SYNC: postgresql+psycopg2://civpulse:civpulse@db:5432/civpulse_geo
      LOG_LEVEL: DEBUG
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  postgres_data:
